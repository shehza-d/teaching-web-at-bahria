<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form onsubmit="createNewUser(event)">
      <input type="email" id="email-ka-input" placeholder="email" />
      <input type="password" id="password-ka-input" placeholder="password" />
      <button>SignUp</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const supabaseClient = supabase.createClient(
        "https://.supabase.co",
        "",
      );

      async function createNewUser(event) {
        event.preventDefault();

        const email = document.querySelector("#email-ka-input").value;
        const password = document.querySelector("#password-ka-input").value;

        const response = await supabaseClient.auth.signUp({
          email: email,
          password: password,
        });

        console.log("response: ", response);
      }
      createNewUser();
    </script>
  </body>
</html>
